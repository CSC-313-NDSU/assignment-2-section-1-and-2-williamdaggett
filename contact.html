<body>
  <div class="container-fluid">
    <div>
      <h2>Get in touch!</h2>
      <p>I'd love to hear from you. Tell me if you found something interesting on my page.<br> Tell me how your day's been. Tell me a cool bug fact. Whatever floats your boat.</p>
    </div>

    <div data-bs-theme="dark" class="p-4 bg-dark" style="color:white; border-radius:25px;">
      <form>
        <div class="mb-3" >
          <label for="emailaddress" class="form-label">Email address</label>
          <input type="email" class="form-control" id="emailaddress">
        </div>
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name">
        </div>
        <div class="mb-3">
          <label for="msg" class="form-label">Message</label>
          <textarea class="form-control" id="msg" rows="4"></textarea>
        </div>
          <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
